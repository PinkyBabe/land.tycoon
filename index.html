<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🏛 LAND TYCOON</title>

<!-- External Libraries -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════
   LAND TYCOON — Core Design System
   Aesthetic: Imperial Cyber-Gold — dark empire meets
   digital frontier. Obsidian blacks, molten gold,
   blood-red alerts, holographic cyan.
═══════════════════════════════════════════════════ */

:root {
  --gold:      #f0a500;
  --gold-dim:  #c47f00;
  --gold-glow: rgba(240,165,0,0.35);
  --cyan:      #00e5ff;
  --cyan-dim:  rgba(0,229,255,0.15);
  --red:       #ff2442;
  --red-dim:   rgba(255,36,66,0.2);
  --obsidian:  #080c14;
  --panel:     rgba(10,15,28,0.94);
  --panel-bdr: rgba(240,165,0,0.25);
  --text:      #e8e4d8;
  --text-dim:  #8a8270;
  --green:     #00e676;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--obsidian);
  color: var(--text);
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
  touch-action: manipulation;
}

/* ── MAP ─────────────────────────────────────────── */
#map {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* ── SCANLINE OVERLAY ────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
}

/* ── TOP HUD BAR ─────────────────────────────────── */
#hud-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: linear-gradient(180deg, rgba(8,12,20,0.98) 0%, rgba(8,12,20,0.85) 100%);
  border-bottom: 1px solid var(--gold);
  box-shadow: 0 0 30px rgba(240,165,0,0.2), inset 0 -1px 0 rgba(240,165,0,0.15);
  gap: 10px;
}

.hud-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(11px, 3.5vw, 18px);
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold-glow), 0 0 40px var(--gold-glow);
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}

.hud-stats {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: nowrap;
  overflow: hidden;
}

.stat-chip {
  background: rgba(240,165,0,0.1);
  border: 1px solid rgba(240,165,0,0.3);
  border-radius: 6px;
  padding: 3px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 60px;
}

.stat-chip .label {
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.stat-chip .value {
  font-family: 'Orbitron', monospace;
  font-size: clamp(10px, 2.5vw, 14px);
  color: var(--gold);
  font-weight: 700;
  text-shadow: 0 0 10px var(--gold-glow);
}

.stat-chip .value.green { color: var(--green); text-shadow: 0 0 10px rgba(0,230,118,0.4); }

/* ── BOTTOM CONTROL PANEL ────────────────────────── */
#hud-bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 10px 12px 14px;
  background: linear-gradient(0deg, rgba(8,12,20,0.98) 0%, rgba(8,12,20,0.82) 100%);
  border-top: 1px solid var(--panel-bdr);
  box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
}

.control-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  align-items: stretch;
}

/* ── BUTTONS ─────────────────────────────────────── */
.btn-tycoon {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: clamp(12px, 3.5vw, 15px);
  letter-spacing: 1px;
  text-transform: uppercase;
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  flex: 1;
  min-height: 48px;
  max-width: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

.btn-tycoon::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  pointer-events: none;
}

.btn-mark {
  background: linear-gradient(135deg, #003d6b 0%, #0062aa 100%);
  color: #fff;
  border: 1px solid #0090e0;
  box-shadow: 0 0 16px rgba(0,144,224,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
  font-size: clamp(13px, 3.8vw, 16px);
  font-weight: 800;
  letter-spacing: 1.5px;
}
.btn-mark:hover  { transform: translateY(-1px); box-shadow: 0 0 28px rgba(0,144,224,0.7); }
.btn-mark:active { transform: scale(0.96); box-shadow: 0 0 8px rgba(0,144,224,0.3); }
.btn-mark:disabled {
  opacity: 0.45; cursor: not-allowed; transform: none;
  box-shadow: none; filter: grayscale(0.4);
}
  background: linear-gradient(135deg, #004a00 0%, #007a00 100%);
  border-color: #00c800;
  box-shadow: 0 0 20px rgba(0,200,0,0.5);
  animation: lockPulse 0.6s ease;
}
@keyframes lockPulse {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.93); }
  70%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}

.btn-clear {
  background: linear-gradient(135deg, #4a1500 0%, #6b2000 100%);
  color: #ff8a65;
  border: 1px solid #8b3500;
  box-shadow: 0 0 12px rgba(107,32,0,0.3);
}
.btn-clear:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(107,32,0,0.5); }
.btn-clear:active { transform: translateY(1px); }

.btn-finish {
  background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 100%);
  color: var(--obsidian);
  font-weight: 900;
  border: 1px solid #ffc107;
  box-shadow: 0 0 20px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-finish:hover { transform: translateY(-1px); box-shadow: 0 0 32px rgba(240,165,0,0.7); }
.btn-finish:active { transform: translateY(1px); }
.btn-finish:disabled {
  opacity: 0.4; cursor: not-allowed; transform: none;
  box-shadow: none;
}

.btn-icon { font-size: 1.1em; }

/* ── STATUS BAR ──────────────────────────────────── */
#status-bar {
  text-align: center;
  font-family: 'Orbitron', monospace;
  font-size: clamp(9px, 2.5vw, 12px);
  color: var(--cyan);
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-shadow: 0 0 8px rgba(0,229,255,0.5);
  min-height: 16px;
  transition: color 0.3s;
}
#status-bar.error { color: var(--red); text-shadow: 0 0 8px rgba(255,36,66,0.6); }
#status-bar.success { color: var(--green); text-shadow: 0 0 8px rgba(0,230,118,0.5); }

/* ── POINT COUNTER BADGE ─────────────────────────── */
#pts-badge {
  position: fixed;
  top: 70px; right: 10px;
  z-index: 99;
  background: var(--panel);
  border: 1px solid var(--panel-bdr);
  border-radius: 10px;
  padding: 6px 10px;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--text-dim);
  display: none;
}
#pts-badge span { color: var(--cyan); font-weight: 700; font-size: 14px; display: block; text-align: center; }

/* ── CLAIM MODAL ─────────────────────────────────── */
#claim-modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(8,12,20,0.88);
  backdrop-filter: blur(6px);
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
#claim-modal-overlay.show { display: flex; }

#claim-modal {
  width: 100%;
  max-width: 520px;
  background: linear-gradient(170deg, #0d1525 0%, #080c14 100%);
  border: 1px solid var(--panel-bdr);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 28px;
  box-shadow: 0 -10px 60px rgba(240,165,0,0.15);
  animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-drag-handle {
  width: 40px; height: 4px;
  background: rgba(240,165,0,0.3);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.modal-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(14px, 4vw, 20px);
  color: var(--gold);
  text-align: center;
  margin-bottom: 6px;
  text-shadow: 0 0 20px var(--gold-glow);
}

.modal-subtitle {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 22px;
}

.modal-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.info-cell {
  background: rgba(240,165,0,0.06);
  border: 1px solid rgba(240,165,0,0.15);
  border-radius: 8px;
  padding: 10px 12px;
}

.info-cell .ic-label {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.info-cell .ic-value {
  font-family: 'Orbitron', monospace;
  font-size: clamp(12px, 3.5vw, 16px);
  color: var(--gold);
  font-weight: 700;
}

.form-label-tycoon {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: block;
}

.input-tycoon {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(240,165,0,0.25);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 14px;
  -webkit-appearance: none;
}

.input-tycoon:focus {
  border-color: var(--gold);
  box-shadow: 0 0 12px var(--gold-glow);
  background: rgba(240,165,0,0.05);
}

.input-tycoon::placeholder { color: var(--text-dim); }

.btn-submit-claim {
  width: 100%;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: var(--obsidian);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(13px, 3.5vw, 16px);
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  box-shadow: 0 0 24px var(--gold-glow);
  transition: all 0.2s;
  min-height: 54px;
  margin-top: 4px;
}
.btn-submit-claim:hover { transform: translateY(-1px); box-shadow: 0 0 36px rgba(240,165,0,0.6); }
.btn-submit-claim:active { transform: translateY(1px); }
.btn-submit-claim:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-cancel-claim {
  width: 100%;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 8px;
  min-height: 44px;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-cancel-claim:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

/* ── TOAST NOTIFICATIONS ─────────────────────────── */
#toast-container {
  position: fixed;
  top: 70px; left: 50%;
  transform: translateX(-50%);
  z-index: 600;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
  width: 90%;
  max-width: 400px;
}

.toast-msg {
  background: var(--panel);
  border-radius: 10px;
  padding: 11px 16px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-align: center;
  animation: toastIn 0.3s ease, toastOut 0.4s ease 2.6s forwards;
  pointer-events: none;
  border: 1px solid;
  line-height: 1.4;
}

.toast-success { border-color: var(--green); color: var(--green); box-shadow: 0 0 16px rgba(0,230,118,0.25); }
.toast-error   { border-color: var(--red);   color: var(--red);   box-shadow: 0 0 16px rgba(255,36,66,0.25); }
.toast-info    { border-color: var(--cyan);  color: var(--cyan);  box-shadow: 0 0 16px rgba(0,229,255,0.2); }
.toast-gold    { border-color: var(--gold);  color: var(--gold);  box-shadow: 0 0 16px var(--gold-glow); }

@keyframes toastIn  { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-8px); } }

/* ── OVERLAP FLASH OVERLAY ───────────────────────── */
.overlap-flash {
  animation: overlapPulse 1.2s ease forwards;
}
@keyframes overlapPulse {
  0%   { opacity:0; }
  20%  { opacity:1; }
  70%  { opacity:0.7; }
  100% { opacity:0; }
}

/* ── PULSE MARKER ────────────────────────────────── */
@keyframes pulseRing {
  0%   { transform: scale(1);   opacity: 0.8; }
  100% { transform: scale(2.5); opacity: 0;   }
}
.pulse-marker {
  position: relative;
  width: 16px; height: 16px;
}
.pulse-dot {
  width: 12px; height: 12px;
  background: var(--cyan);
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  box-shadow: 0 0 6px var(--cyan);
}
.pulse-ring {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid var(--cyan);
  position: absolute;
  top: 0; left: 0;
  animation: pulseRing 1.4s ease-out infinite;
}

/* ── LEADERBOARD PANEL ───────────────────────────── */
#leaderboard-panel {
  position: fixed;
  top: 70px; left: 10px;
  z-index: 99;
  width: 180px;
  background: var(--panel);
  border: 1px solid var(--panel-bdr);
  border-radius: 10px;
  padding: 10px 12px;
  display: none;
  max-height: 60vh;
  overflow-y: auto;
}
#leaderboard-panel.show { display: block; }

.lb-title {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(240,165,0,0.2);
  padding-bottom: 6px;
}

.lb-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 6px;
}
.lb-row .lb-name { color: var(--text); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; }
.lb-row .lb-val  { color: var(--gold); font-family: 'Orbitron', monospace; font-size: 9px; white-space: nowrap; }

/* ── TOGGLE LB BUTTON ────────────────────────────── */
#lb-toggle {
  position: fixed;
  top: 70px; left: 10px;
  z-index: 100;
  width: 36px; height: 36px;
  background: var(--panel);
  border: 1px solid var(--panel-bdr);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--gold);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

/* ── LEAFLET OVERRIDES ───────────────────────────── */
.leaflet-control-attribution { display: none !important; }
.leaflet-control-zoom a {
  background: rgba(10,15,28,0.92) !important;
  color: var(--gold) !important;
  border-color: rgba(240,165,0,0.3) !important;
  font-weight: 700;
}

/* ── LOADING SCREEN ──────────────────────────────── */
#loading-screen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--obsidian);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.6s ease;
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }

.load-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(22px, 7vw, 42px);
  color: var(--gold);
  text-shadow: 0 0 40px var(--gold-glow), 0 0 80px var(--gold-glow);
  text-align: center;
  line-height: 1.2;
}

.load-sub {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.load-bar-track {
  width: 200px; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.load-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--cyan));
  border-radius: 2px;
  animation: loadFill 1.8s ease forwards;
}
@keyframes loadFill { from { width:0%; } to { width:100%; } }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(240,165,0,0.3); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── LOADING SCREEN ─────────────────────────────── -->
<div id="loading-screen">
  <div class="load-title">🏛 LAND<br>TYCOON</div>
  <div class="load-sub">Acquiring Coordinates…</div>
  <div class="load-bar-track"><div class="load-bar-fill"></div></div>
</div>

<!-- ── MAP CONTAINER ──────────────────────────────── -->
<div id="map"></div>

<!-- ── TOP HUD ─────────────────────────────────────── -->
<div id="hud-top">
  <div class="hud-title">🏛 LAND TYCOON</div>
  <div class="hud-stats">
    <div class="stat-chip">
      <div class="label">PARCELS</div>
      <div class="value" id="stat-parcels">0</div>
    </div>
    <div class="stat-chip">
      <div class="label">PORTFOLIO</div>
      <div class="value green" id="stat-value">$0</div>
    </div>
    <div class="stat-chip">
      <div class="label">AREA</div>
      <div class="value" id="stat-area">0 m²</div>
    </div>
  </div>
</div>

<!-- ── LEADERBOARD TOGGLE ─────────────────────────── -->
<div id="lb-toggle" onclick="toggleLeaderboard()" title="Leaderboard">🏆</div>
<div id="leaderboard-panel">
  <div class="lb-title">🏆 Top Owners</div>
  <div id="lb-rows"></div>
</div>

<!-- ── GPS ACCURACY + NODE COUNTER BADGE ─────────── -->
<div id="pts-badge" style="display:none">
  <div style="display:flex;gap:10px;align-items:center">
    <div style="text-align:center">
      <div style="font-family:'Orbitron',monospace;font-size:7px;color:var(--text-dim);letter-spacing:1px">NODES</div>
      <span id="pts-count" style="color:var(--cyan);font-weight:700;font-size:14px;font-family:'Orbitron',monospace;display:block">0</span>
    </div>
    <div style="width:1px;height:28px;background:rgba(255,255,255,0.1)"></div>
    <div style="text-align:center">
      <div style="font-family:'Orbitron',monospace;font-size:7px;color:var(--text-dim);letter-spacing:1px">GPS ±</div>
      <span id="acc-val" style="color:var(--green);font-weight:700;font-size:12px;font-family:'Orbitron',monospace;display:block">—</span>
    </div>
  </div>
</div>

<!-- ── BOTTOM HUD ──────────────────────────────────── -->
<div id="hud-bottom">
  <div id="status-bar">WALK TO A CORNER AND PRESS MARK HERE</div>
  <div class="control-row">
    <button class="btn-tycoon btn-mark" id="btn-mark" onclick="markHere()">
      <span class="btn-icon">📍</span> Mark Here
    </button>
    <button class="btn-tycoon btn-clear" id="btn-clear" onclick="clearPoints()">
      <span class="btn-icon">🗑</span> Clear
    </button>
    <button class="btn-tycoon btn-finish" id="btn-finish" onclick="finishPolygon()" disabled>
      <span class="btn-icon">✅</span> Finish
    </button>
  </div>
</div>

<!-- ── CLAIM MODAL ─────────────────────────────────── -->
<div id="claim-modal-overlay">
  <div id="claim-modal">
    <div class="modal-drag-handle"></div>
    <div class="modal-title">⚖️ Register Your Claim</div>
    <div class="modal-subtitle">ENTER LAND TITLE DETAILS</div>

    <div class="modal-info-grid">
      <div class="info-cell">
        <div class="ic-label">Area</div>
        <div class="ic-value" id="modal-area">—</div>
      </div>
      <div class="info-cell">
        <div class="ic-label">Land Value</div>
        <div class="ic-value" id="modal-value">—</div>
      </div>
    </div>

    <label class="form-label-tycoon">Land Title Designation</label>
    <input class="input-tycoon" id="input-title" type="text"
           placeholder='e.g. "Lot 42-A — North Ridge"'
           maxlength="80" autocomplete="off"/>

    <label class="form-label-tycoon">Owner Name / Alias</label>
    <input class="input-tycoon" id="input-owner" type="text"
           placeholder='e.g. "Don Alejandro"'
           maxlength="60" autocomplete="off"/>

    <button class="btn-submit-claim" id="btn-submit" onclick="submitClaim()">
      🏛 REGISTER PARCEL
    </button>
    <button class="btn-cancel-claim" onclick="cancelModal()">
      ✕ Cancel
    </button>
  </div>
</div>

<!-- ── TOAST CONTAINER ─────────────────────────────── -->
<div id="toast-container"></div>

<!-- ══════════════════════════════════════════════════
     JAVASCRIPT — LAND TYCOON ENGINE
══════════════════════════════════════════════════════ -->
<script>
// ╔═══════════════════════════════════════════════════╗
// ║  CONFIG — replace with your Apps Script URL       ║
// ╚═══════════════════════════════════════════════════╝
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2Kk9Z0mmH4REuybyUWT8_29SeH0AgaMw5cSwK_m4lagnpmVTGgdVEAq9M_BkToFbo_g/exec";

// ─── State ────────────────────────────────────────────
const state = {
  points:        [],        // [[lat,lng], ...]  from GPS
  markers:       [],        // Leaflet node markers
  liveMarker:    null,      // moving "you are here" marker
  liveAccCircle: null,      // accuracy circle
  polyline:      null,      // live preview polyline
  existingLayers:[],
  existingTurf:  [],
  pendingCoords: null,
  pendingArea:   0,
  deviceId:      getDeviceId(),
  portfolio:     { parcels:0, value:0, area:0 },
  owners:        {},
  gpsReady:      false,
  currentPos:    null,      // latest GeolocationPosition
  watchId:       null,
};

// ─── Map Initialization ───────────────────────────────
const map = L.map('map', {
  center: [7.0, 125.6],
  zoom: 17,
  zoomControl: true,
  tap: false,               // map taps no longer place points
  doubleClickZoom: false,
});

L.tileLayer(
  'https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
  { subdomains:['mt0','mt1','mt2','mt3'], maxZoom: 21 }
).addTo(map);

// ─── Live GPS Watch ───────────────────────────────────
function startGPSWatch() {
  if (!navigator.geolocation) {
    showToast('❌ GPS not supported on this device.', 'error');
    setStatus('GPS NOT AVAILABLE', 'error');
    return;
  }

  setStatus('🛰 ACQUIRING GPS SIGNAL…', '');

  state.watchId = navigator.geolocation.watchPosition(
    onGPSUpdate,
    onGPSError,
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );
}

function onGPSUpdate(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  state.currentPos = [lat, lng];
  state.gpsReady   = true;

  // First fix — fly to location
  if (!state.liveMarker) {
    map.setView([lat, lng], 19);
  }

  // Update live "you" marker
  if (state.liveMarker) map.removeLayer(state.liveMarker);
  if (state.liveAccCircle) map.removeLayer(state.liveAccCircle);

  const icon = L.divIcon({
    html: `<div class="pulse-marker"><div class="pulse-dot"></div><div class="pulse-ring"></div></div>`,
    className: '', iconSize:[16,16], iconAnchor:[8,8]
  });
  state.liveMarker    = L.marker([lat, lng], { icon, interactive:false, zIndexOffset:1000 }).addTo(map);
  state.liveAccCircle = L.circle([lat, lng], {
    radius: accuracy,
    color: '#00e5ff', fillColor:'#00e5ff',
    fillOpacity: 0.06, weight: 1, dashArray:'4 4'
  }).addTo(map);

  // Update accuracy badge
  document.getElementById('pts-badge').style.display = 'block';
  document.getElementById('acc-val').textContent = Math.round(accuracy) + 'm';

  if (!state.gpsWasReady) {
    state.gpsWasReady = true;
    setStatus('WALK TO A CORNER — PRESS MARK HERE', '');
    showToast(`📡 GPS locked! ±${Math.round(accuracy)}m accuracy`, 'info');
    document.getElementById('btn-mark').disabled = false;
  }
}

function onGPSError(err) {
  const msgs = {
    1: 'Location permission denied. Please allow GPS.',
    2: 'GPS signal lost. Move to open sky.',
    3: 'GPS timeout. Retrying…'
  };
  showToast('⚠ ' + (msgs[err.code] || 'GPS error'), 'error');
  setStatus('GPS ERROR — CHECK PERMISSIONS', 'error');
}

// ─── MARK HERE — core action ─────────────────────────
function markHere() {
  if (!state.gpsReady || !state.currentPos) {
    showToast('⏳ Waiting for GPS fix…', 'error');
    return;
  }

  const [lat, lng] = state.currentPos;
  const n = state.points.length + 1;

  // Visual feedback on button
  const btn = document.getElementById('btn-mark');
  btn.classList.add('locking');
  setTimeout(() => btn.classList.remove('locking'), 650);

  // Place numbered node marker
  const icon = L.divIcon({
    html: `<div style="
      width:26px;height:26px;
      background:var(--cyan);
      border:2px solid #fff;
      border-radius:50%;
      box-shadow:0 0 10px var(--cyan),0 0 20px rgba(0,229,255,0.4);
      display:flex;align-items:center;justify-content:center;
      font-family:'Orbitron',monospace;font-size:9px;font-weight:700;
      color:#000;
    ">${n}</div>`,
    className: '', iconSize:[26,26], iconAnchor:[13,13]
  });

  const marker = L.marker([lat, lng], { icon }).addTo(map);
  marker.bindTooltip(`Node ${n}<br>${lat.toFixed(6)}, ${lng.toFixed(6)}`, { permanent:false });
  state.markers.push(marker);
  state.points.push([lat, lng]);

  updatePreview();
  updateUI();

  showToast(`📍 Node ${n} marked at ±${Math.round(state.currentPos._acc || 0)}m`, 'info');
}

// ─── Pulse Marker (static, for existing parcels label) ───
function addPulseMarker(latlng) {
  const icon = L.divIcon({
    html: `<div class="pulse-marker"><div class="pulse-dot"></div><div class="pulse-ring"></div></div>`,
    className: '', iconSize:[16,16], iconAnchor:[8,8]
  });
  L.marker(latlng, { icon, interactive:false }).addTo(map);
}

// ─── Preview polyline ─────────────────────────────────
function updatePreview() {
  if (state.polyline) map.removeLayer(state.polyline);
  if (state.points.length < 2) return;
  const pts = state.points.length >= 3
    ? [...state.points, state.points[0]]
    : state.points;
  state.polyline = L.polyline(pts, {
    color: '#00e5ff', weight: 2, dashArray: '6 4', opacity: 0.85
  }).addTo(map);
}

// ─── UI sync ──────────────────────────────────────────
function updateUI() {
  const n = state.points.length;
  document.getElementById('pts-count').textContent = n;
  document.getElementById('btn-finish').disabled = n < 3;

  if (n === 0) {
    setStatus('WALK TO A CORNER — PRESS MARK HERE', '');
  } else if (n < 3) {
    setStatus(`NODE ${n} LOCKED ✓ — WALK TO NEXT CORNER`, '');
  } else {
    setStatus(`${n} NODES — PRESS FINISH OR KEEP WALKING`, '');
  }
}

// ─── Clear all points ─────────────────────────────────
function clearPoints() {
  state.points = [];
  state.markers.forEach(m => map.removeLayer(m));
  state.markers = [];
  if (state.polyline) { map.removeLayer(state.polyline); state.polyline = null; }
  document.getElementById('pts-count').textContent = '0';
  document.getElementById('btn-finish').disabled = true;
  if (state.gpsReady) setStatus('CLEARED — WALK TO FIRST CORNER & MARK HERE', '');
  else setStatus('ACQUIRING GPS SIGNAL…', '');
}

// ─── Finish polygon & check overlaps ──────────────────
function finishPolygon() {
  if (state.points.length < 3) {
    showToast('Need at least 3 nodes!', 'error'); return;
  }

  const coords = [...state.points];

  // Build turf polygon (close it)
  const ring = coords.map(p => [p[1], p[0]]); // turf uses [lng,lat]
  ring.push(ring[0]);
  const newPoly = turf.polygon([ring]);

  // ── Overlap Detection ──────────────────────────────
  let overlap = false;
  let overlapLayer = null;

  for (const existing of state.existingTurf) {
    try {
      const intersection = turf.intersect(newPoly, existing.poly);
      if (intersection) {
        overlap = true;
        overlapLayer = existing;
        break;
      }
    } catch(_) {}
  }

  if (overlap) {
    // Flash conflict area red
    const conflictLayer = L.polygon(coords, {
      color: '#ff2442', fillColor: '#ff2442',
      fillOpacity: 0.45, weight: 3,
      className: 'overlap-flash'
    }).addTo(map);
    setTimeout(() => map.removeLayer(conflictLayer), 1500);

    setStatus('⚠ LAND DISPUTE DETECTED!', 'error');
    showToast('🚨 LAND DISPUTE! Your claim overlaps with an existing parcel.', 'error');

    // Highlight conflicting existing parcel
    if (overlapLayer && overlapLayer.layer) {
      const orig = overlapLayer.layer.options.color;
      overlapLayer.layer.setStyle({ color:'#ff2442', weight:3 });
      setTimeout(() => overlapLayer.layer.setStyle({ color: orig || '#f0a500', weight:2 }), 2000);
    }
    return;
  }

  // ── Area Calculation ───────────────────────────────
  const areaSqm = Math.round(turf.area(newPoly));
  const value   = areaSqm * 10;

  state.pendingCoords = coords;
  state.pendingArea   = areaSqm;

  // Populate modal
  document.getElementById('modal-area').textContent  = areaSqm.toLocaleString() + ' m²';
  document.getElementById('modal-value').textContent = '$' + value.toLocaleString();
  document.getElementById('input-title').value = '';
  document.getElementById('input-owner').value = '';

  openModal();
}

// ─── Modal helpers ────────────────────────────────────
function openModal() {
  document.getElementById('claim-modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('input-title').focus(), 400);
}

function cancelModal() {
  document.getElementById('claim-modal-overlay').classList.remove('show');
}

// ─── Submit claim ─────────────────────────────────────
async function submitClaim() {
  const titleNo = document.getElementById('input-title').value.trim();
  const owner   = document.getElementById('input-owner').value.trim();

  if (!titleNo) { showToast('Please enter a Land Title name.', 'error'); return; }
  if (!owner)   { showToast('Please enter an Owner name.',     'error'); return; }

  const areaSqm = state.pendingArea;
  const value   = areaSqm * 10;
  const coords  = state.pendingCoords;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '⏳ Registering…';

  const payload = {
    deviceId: state.deviceId,
    titleNo, owner,
    area:  areaSqm,
    value: value,
    coordinates: coords
  };

  try {
    // Save to Google Sheets
    await postToSheet(payload);

    // Draw the parcel on map
    drawParcel(coords, titleNo, owner, value, areaSqm);

    // Update HUD stats
    state.portfolio.parcels++;
    state.portfolio.value += value;
    state.portfolio.area  += areaSqm;
    updateStatsHUD();

    // Update leaderboard
    state.owners[owner] = (state.owners[owner] || 0) + value;
    updateLeaderboard();

    // Shout message on map
    const center = coords.reduce((a,c)=>[a[0]+c[0]/coords.length, a[1]+c[1]/coords.length], [0,0]);
    showShoutMarker(center, `"I just claimed ${titleNo} for $${value.toLocaleString()}!"`);

    cancelModal();
    clearPoints();

    setStatus('PARCEL REGISTERED ✓ — WALK TO NEXT CLAIM', 'success');
    showToast(`🏛 "${titleNo}" claimed for $${value.toLocaleString()}!`, 'gold');

  } catch(err) {
    showToast('❌ Failed to save. Check your Apps Script URL.', 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '🏛 REGISTER PARCEL';
  }
}

// ─── Draw existing/new parcel on map ─────────────────
function drawParcel(coords, titleNo, owner, value, area) {
  const colors = ['#f0a500','#00e5ff','#a855f7','#00e676','#ff8a65'];
  const color  = colors[state.existingTurf.length % colors.length];

  const layer = L.polygon(coords, {
    color,
    fillColor: color,
    fillOpacity: 0.2,
    weight: 2
  }).addTo(map);

  layer.bindPopup(`
    <div style="font-family:'Rajdhani',sans-serif;min-width:160px">
      <strong style="color:${color};font-size:15px">${titleNo}</strong><br>
      <span style="color:#888;font-size:11px">Owner:</span> <strong>${owner}</strong><br>
      <span style="color:#888;font-size:11px">Area:</span> ${area.toLocaleString()} m²<br>
      <span style="color:#888;font-size:11px">Value:</span> <strong style="color:#f0a500">$${value.toLocaleString()}</strong>
    </div>
  `);

  // Store for overlap detection
  const ring = coords.map(p => [p[1], p[0]]);
  ring.push(ring[0]);
  state.existingTurf.push({
    poly:  turf.polygon([ring]),
    layer: layer
  });
  state.existingLayers.push(layer);
}

// ─── Shout popup on map ───────────────────────────────
function showShoutMarker([lat, lng], msg) {
  const icon = L.divIcon({
    html: `<div style="
      background:rgba(10,15,28,0.92);
      border:1px solid var(--gold);
      border-radius:8px;
      padding:6px 10px;
      font-family:'Rajdhani',sans-serif;
      font-size:12px;
      color:var(--gold);
      white-space:nowrap;
      box-shadow:0 0 12px rgba(240,165,0,0.3);
      max-width:200px;
      white-space:normal;
      text-align:center;
    ">${msg}</div>`,
    className: '', iconAnchor:[0,0]
  });
  const m = L.marker([lat, lng], { icon }).addTo(map);
  setTimeout(() => map.removeLayer(m), 6000);
}

// ─── Google Sheets integration ────────────────────────
async function postToSheet(payload) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE') {
    console.warn('Apps Script URL not set — skipping server save.');
    return { status: 'ok' };
  }
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body:   JSON.stringify(payload),
    headers:{ 'Content-Type':'application/json' }
  });
  const data = await res.json();
  if (data.status === 'overlap') throw new Error('Server: ' + data.message);
  if (data.status === 'error')   throw new Error(data.message);
  return data;
}

async function loadExistingParcels() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE') {
    console.warn('No Apps Script URL — skipping initial load.');
    return;
  }
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?action=getParcels');
    const data = await res.json();
    if (data.status !== 'ok') return;

    data.parcels.forEach(p => {
      if (!p.coordinates || p.coordinates.length < 3) return;
      drawParcel(p.coordinates, p.titleNo, p.owner, p.value, p.area);
      state.portfolio.parcels++;
      state.portfolio.value += parseFloat(p.value) || 0;
      state.portfolio.area  += parseFloat(p.area)  || 0;
      state.owners[p.owner] = (state.owners[p.owner] || 0) + (parseFloat(p.value) || 0);
    });

    updateStatsHUD();
    updateLeaderboard();
  } catch(e) {
    console.warn('Could not load existing parcels:', e);
  }
}

// ─── HUD Update ───────────────────────────────────────
function updateStatsHUD() {
  document.getElementById('stat-parcels').textContent = state.portfolio.parcels;
  document.getElementById('stat-value').textContent   = '$' + Math.round(state.portfolio.value).toLocaleString();
  const area = state.portfolio.area;
  document.getElementById('stat-area').textContent    =
    area >= 10000 ? (area/10000).toFixed(2) + ' ha' : Math.round(area).toLocaleString() + ' m²';
}

// ─── Leaderboard ──────────────────────────────────────
function toggleLeaderboard() {
  document.getElementById('leaderboard-panel').classList.toggle('show');
}

function updateLeaderboard() {
  const sorted = Object.entries(state.owners)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 10);

  const medals = ['🥇','🥈','🥉'];
  document.getElementById('lb-rows').innerHTML = sorted.map(([name, val], i) => `
    <div class="lb-row">
      <span class="lb-name">${medals[i] || (i+1+'.')} ${name}</span>
      <span class="lb-val">$${Math.round(val).toLocaleString()}</span>
    </div>
  `).join('');
}

// ─── Toast system ─────────────────────────────────────
function showToast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-msg toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ─── Status bar ───────────────────────────────────────
function setStatus(msg, cls='') {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className   = cls ? `error` === cls ? 'error' : cls === 'success' ? 'success' : '' : '';
}

// ─── Device ID ───────────────────────────────────────
function getDeviceId() {
  let id = localStorage.getItem('lt_device_id');
  if (!id) {
    id = 'DEV-' + Math.random().toString(36).substr(2,8).toUpperCase();
    localStorage.setItem('lt_device_id', id);
  }
  return id;
}

// ─── Boot sequence ────────────────────────────────────
window.addEventListener('load', async () => {
  // Disable mark button until GPS is ready
  document.getElementById('btn-mark').disabled = true;

  await new Promise(r => setTimeout(r, 2000));
  const ls = document.getElementById('loading-screen');
  ls.classList.add('fade-out');
  setTimeout(() => ls.remove(), 700);

  await loadExistingParcels();

  // Start continuous GPS watch
  startGPSWatch();

  showToast('🏛 Welcome, Land Tycoon! Walk your land!', 'gold');
});
</script>
</body>
</html>
